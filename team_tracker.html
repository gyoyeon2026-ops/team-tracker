function sortAllMilestones() {
  (S.projects||[]).forEach(function(p) {
    (p.phases||[]).forEach(function(ph) {
      if (!ph.milestones || ph.milestones.length < 2) return;
      ph.milestones.sort(function(a,b) {
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return a.due.localeCompare(b.due);
      });
    });
  });
}

function saveMilestone() {
  const name = document.getElementById('msName').value.trim();
  if (!name) { alert('마일스톤 이름을 입력해주세요.'); return; }
  const p = S.projects.find(x => x.id === editingMsProjId);
  const ph = (p.phases||[]).find(x => x.id === editingMsPhaseId);
  if (!ph) return;
  const kwRaw = document.getElementById('msKeywords').value;
  const keywords = kwRaw ? kwRaw.split(',').map(k => k.trim()).filter(Boolean) : [];
  const assignee = document.getElementById('msAssignee').value;
  if (editingMsId) {
    const m = (ph.milestones||[]).find(x => x.id === editingMsId);
    Object.assign(m, { name, due: document.getElementById('msDue').value, status: document.getElementById('msStatus').value, note: document.getElementById('msNote').value, keywords, assignee });
    m.autoDetected = false;
  } else {
    if (!ph.milestones) ph.milestones = [];
    ph.milestones.push({ id: uid(), name, due: document.getElementById('msDue').value, status: document.getElementById('msStatus').value, note: document.getElementById('msNote').value, keywords, assignee, autoDetected: false });
  }
  sortAllMilestones();
  closeModal('msModal');
  syncNextAction(p);
  autoSave(); renderApp();
}

window.addEventListener('load', async () => {
  try {
    const saved = localStorage.getItem('tt_data');
    if (saved) { S = JSON.parse(saved); if(!S.order) S.order=[]; }
    S.teamName = '교육연구부';
    S.members = ['서기원 대리','황수연 주임','이경희 주임','팀원 4'];
    if (!S.projects) S.projects = [];
    if (!S.order) S.order = [];
    if (S.projects) S.projects.forEach(p => { if (p.phases && p.phases.length) syncNextAction(p); });
    sortAllMilestones();
    const sid = localStorage.getItem('tt_gistId');
    const stok = localStorage.getItem('tt_token');
    if (sid) document.getElementById('gistId').value = sid;
    if (stok) document.getElementById('gistToken').value = stok;
  } catch(e) { console.error(e); }
  renderApp();

  // 페이지 열릴 때 Gist 자동 불러오기
  const autoSid = localStorage.getItem('tt_gistId');
  const autoTok = localStorage.getItem('tt_token');
  if (autoSid) {
    document.getElementById('savedT').textContent = '동기화 중...';
    try {
      const headers = autoTok ? {Authorization: 'token ' + autoTok} : {};
      const res = await fetch('https://api.github.com/gists/' + autoSid, {headers});
      const j = await res.json();
      const file = j.files && j.files['team_tracker.json'];
      if (file) {
        const content = file.truncated ? await (await fetch(file.raw_url)).text() : file.content;
        const remote = JSON.parse(content);
        // 로컬보다 Gist가 더 최신이면 불러오기
        const remoteTime = remote.lastSaved ? new Date(remote.lastSaved).getTime() : 0;
        const localTime = S.lastSaved ? new Date(S.lastSaved).getTime() : 0;
        if (remoteTime > localTime) {
          S = remote;
          S.teamName = '교육연구부';
          S.members = ['서기원 대리','황수연 주임','이경희 주임','팀원 4'];
          if (S.projects) S.projects.forEach(p => { if (p.phases && p.phases.length) syncNextAction(p); });
          sortAllMilestones();
          autoSave();
          renderApp();
          const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
          document.getElementById('savedT').textContent = '동기화 완료 ' + t;
        } else {
          const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
          document.getElementById('savedT').textContent = '최신 상태 ' + t;
        }
      }
    } catch(e) {
      document.getElementById('savedT').textContent = '오프라인';
    }
  }
});

function generateWeeklySummary() {
  try {
    var now = new Date();
    var weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
    var weekAgoStr = weekAgo.toISOString().slice(0,10);
    var lines = [];
    lines.push('📋 주간 업무 현황 요약');
    lines.push(weekAgo.getFullYear()+'.'+(weekAgo.getMonth()<9?'0':'')+(weekAgo.getMonth()+1)+'.'+(weekAgo.getDate()<10?'0':'')+weekAgo.getDate()+' ~ '+now.getFullYear()+'.'+(now.getMonth()<9?'0':'')+(now.getMonth()+1)+'.'+(now.getDate()<10?'0':'')+now.getDate());
    lines.push('');
    (S.projects||[]).forEach(function(p) {
      var reps = (p.reports||[]).filter(function(r){ return (r.date||'') >= weekAgoStr; });
      if (!reps.length) return;
      lines.push('▶ '+p.name+' ('+(S.members[p.memberId]||'')+', '+p.progress+'%)');
      reps.forEach(function(r){ lines.push('  ['+r.date+'] '+r.content+(r.hasIssue?' 🚨':'')); });
      if (p.nextAction) lines.push('  → 다음: '+p.nextAction+(p.nextActionDue?' ('+p.nextActionDue+')':''));
      lines.push('');
    });
    if (lines.length <= 3) { alert('이번 주 보고 내용이 없습니다.'); return; }
    var text = lines.join(String.fromCharCode(10));
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ alert('✅ 클립보드에 복사됐습니다!'); }).catch(function(){ prompt('복사해주세요:', text); });
    } else { prompt('복사해주세요:', text); }
  } catch(e) { alert('오류: '+e.message); }
}
</script>
