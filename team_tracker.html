<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 업무 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0efe9;--surface:#fff;--surface2:#f7f6f2;--border:#e0ddd4;--border-s:#c6c2b5;
  --text:#1a1916;--t2:#555249;--t3:#93907f;
  --accent:#2c5a8e;--accent-l:#e5edf8;--accent-2:#1a3a5c;
  --green:#27785a;--green-l:#e5f3ed;
  --yellow:#ad680a;--yellow-l:#fef2db;
  --red:#b82b1e;--red-l:#fce8e6;
  --gray:#66635c;--gray-l:#ecebe7;
  --purple:#6648a8;--purple-l:#eeebf9;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --sh2:0 2px 10px rgba(0,0,0,.10),0 8px 28px rgba(0,0,0,.07);
  --sh3:0 4px 20px rgba(0,0,0,.13),0 14px 36px rgba(0,0,0,.09);
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

/* ── HEADER ── */
.hd{background:#14120d;color:#fff;padding:0 18px;display:flex;align-items:center;gap:10px;height:52px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);}
.hd-logo{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;opacity:.3;text-transform:uppercase;}
.hd-div{width:1px;height:16px;background:rgba(255,255,255,.15);}
.hd-title{font-size:14px;font-weight:700;letter-spacing:-.3px;flex:1;}
.hd-actions{display:flex;gap:6px;align-items:center;}
.saved-t{font-size:10px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;}

/* search */
.search-wrap{position:relative;display:flex;align-items:center;}
.search-icon-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:6px;border-radius:6px;font-size:16px;transition:all .15s;}
.search-icon-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.search-input{width:0;overflow:hidden;opacity:0;border:none;background:rgba(255,255,255,.1);color:#fff;border-radius:6px;padding:0;font-size:13px;font-family:inherit;outline:none;transition:all .2s;}
.search-input::placeholder{color:rgba(255,255,255,.4);}
.search-input.open{width:180px;padding:6px 10px;opacity:1;}
.search-results{position:absolute;top:42px;right:0;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh3);z-index:200;max-height:400px;overflow-y:auto;display:none;}
.search-results.show{display:block;}
.sr-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--surface2);}
.sr-proj{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:2px;}
.sr-text{font-size:12px;color:var(--text);line-height:1.4;}
.sr-text mark{background:var(--yellow-l);color:var(--yellow);font-weight:700;border-radius:2px;padding:0 2px;}
.sr-meta{font-size:10px;color:var(--t3);margin-top:2px;}
.sr-empty{padding:20px;text-align:center;font-size:12px;color:var(--t3);}

/* ── MEETING BANNER ── */
.mtg-banner{background:#12122a;color:#9dd4ff;padding:8px 18px;font-size:12px;font-weight:600;display:none;align-items:center;gap:10px;}
.mtg-banner.on{display:flex;}
.mtg-dot{width:8px;height:8px;border-radius:50%;background:#ff4040;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── HOME VIEW ── */
.home-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;max-width:960px;margin:0 auto;}
.home-bar-label{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.3px;}
.member-filter-btn{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--border-s);background:var(--surface);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .12s;}
.member-filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.member-filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.bar-sep{width:1px;height:18px;background:var(--border-s);}

.stats-row{display:flex;gap:5px;padding:8px 10px 0;max-width:960px;margin:0 auto;}
.stat-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:pointer;transition:all .12s;text-align:center;}
.stat-pill:hover{border-color:var(--accent);}
.stat-pill.active{border-color:var(--accent);background:var(--accent-l);}
.sp-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;}
.sp-val.ac{color:var(--accent);}
.sp-val.gr{color:var(--green);}
.sp-val.rd{color:var(--red);}
.sp-val.yl{color:var(--yellow);}
.sp-label{font-size:7px;color:var(--t3);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-top:1px;}

/* card grid */
.card-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  padding:8px 12px 20px;
  max-width:900px;
  margin:0 auto;
}

/* ── 직사각형 텍스트 카드 ── */
.pc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:all .15s ease;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.pc:hover{
  border-color:var(--accent);
  box-shadow:0 4px 14px rgba(0,0,0,.1);
  transform:translateY(-1px);
}
.pc-banner{display:none;}
.pc-banner-bg{display:none;}
.pc-banner-deco{display:none;}
.pc-banner-icon{display:none;}
.pc-banner-meta{display:none;}
.pc-banner-status{display:none;}
.pc-prog-bar-wrap{display:none;}
.pc-prog-bar-fill{display:none;}
.pc-order{display:none;}
.order-btn{display:none;}
.pc-issue-dot{display:none;}

.pc-body{
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  gap:0;
  min-width:0;
}
.pc-name{
  font-size:14px;font-weight:700;letter-spacing:-.3px;line-height:1.35;
  color:var(--text);
  margin-bottom:0;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.pc-foot{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.pc-foot-l{display:flex;gap:5px;align-items:center;min-width:0;}

.pc-prog-inline{
  height:3px;background:var(--border);border-radius:2px;overflow:hidden;
}
.pc-prog-inline-fill{height:100%;border-radius:2px;transition:width .3s;}
.pc-prog-inline-fill.low{background:var(--accent);}
.pc-prog-inline-fill.mid{background:var(--yellow);}
.pc-prog-inline-fill.high{background:var(--green);}

.dday-inline{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;
  padding:1px 5px;border-radius:3px;
}
.dday-inline.over{background:var(--red-l);color:var(--red);}
.dday-inline.soon{background:var(--yellow-l);color:var(--yellow);}
.dday-inline.ok{background:var(--green-l);color:var(--green);}

.st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.st-dot.진행중{background:var(--accent);}
.st-dot.완료{background:var(--green);}
.st-dot.계획{background:var(--gray);}
.st-dot.보류{background:var(--yellow);}

.pc-update{font-size:11px;font-weight:600;}
.pc-update.warn{color:var(--yellow);}
.pc-update.danger{color:var(--red);}
.pc-update.ok{color:var(--t3);}
.pc-pct{font-size:11px;font-weight:700;color:var(--t3);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.mem-tag-sm{font-size:11px;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 공유 배지 (상세 페이지용) */
.dday{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:.3px;}
.dday-over{background:var(--red);color:#fff;}
.dday-d{background:var(--red-l);color:var(--red);border:1px solid var(--red);}
.dday-w{background:var(--yellow-l);color:var(--yellow);border:1px solid var(--yellow);}
.dday-ok{background:var(--green-l);color:var(--green);}
.pri-b{font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;}
.pri-b.상{background:var(--red-l);color:var(--red);}
.pri-b.중{background:var(--yellow-l);color:var(--yellow);}
.pri-b.하{background:var(--gray-l);color:var(--gray);}
.mem-tag{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-l);padding:2px 7px;border-radius:20px;}
.st-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.st-계획{background:var(--gray-l);color:var(--gray);}
.st-진행중{background:var(--accent-l);color:var(--accent);}
.st-완료{background:var(--green-l);color:var(--green);}
.st-보류{background:var(--yellow-l);color:var(--yellow);}
.na-box{background:var(--accent-l);border:1px solid #c3d8f0;border-radius:var(--rs);padding:7px 10px;}
.na-label{font-size:9px;font-weight:800;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.na-text{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;}
.na-due{font-size:10px;color:var(--t3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.na-due.warn{color:var(--red);font-weight:600;}
.na-empty{background:var(--gray-l);border:1px dashed var(--border-s);border-radius:var(--rs);padding:6px 10px;font-size:11px;color:var(--t3);}
.prog-row{display:flex;align-items:center;gap:8px;}
.prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}
.prog-fill.low{background:var(--accent);}
.prog-fill.mid{background:var(--yellow);}
.prog-fill.high{background:var(--green);}
.prog-pct{font-size:11px;font-weight:700;color:var(--t2);font-family:'JetBrains Mono',monospace;min-width:30px;text-align:right;}
.issue-strip{background:var(--red-l);border-top:1px solid #f4c0bc;padding:5px 16px;font-size:11px;font-weight:600;color:var(--red);}
.issue-glow{width:7px;height:7px;border-radius:50%;background:#ff4444;box-shadow:0 0 0 2px rgba(255,68,68,.35);animation:pulse .9s infinite alternate;flex-shrink:0;}
@keyframes pulse{from{box-shadow:0 0 0 2px rgba(255,68,68,.35);}to{box-shadow:0 0 0 5px rgba(255,68,68,0);}}
.pri-banner{display:none;}
.dday-banner{display:none;}
.mem-tag-white{display:none;}

/* completed section */
.done-toggle{background:none;border:1px solid var(--border-s);color:var(--t3);font-size:12px;font-weight:600;padding:8px 16px;border-radius:var(--rs);cursor:pointer;font-family:inherit;transition:all .12s;margin:0 18px 20px;display:block;}
.done-toggle:hover{background:var(--surface);color:var(--text);}

/* ── PROJECT DETAIL VIEW ── */
.detail-view{max-width:720px;margin:0 auto;padding:20px 18px 40px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--t3);background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:16px;padding:6px 10px 6px 0;transition:color .12s;}
.back-btn:hover{color:var(--text);}

.det-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.det-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.det-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.det-name{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;}
.det-summary{font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.5;}
.det-meta{display:flex;gap:16px;font-size:12px;color:var(--t3);flex-wrap:wrap;margin-bottom:6px;}

.det-na{background:var(--accent-l);border:1px solid #c3d8f0;border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;}
.det-na .na-label{font-size:10px;}
.det-na .na-text{font-size:13px;}

/* timeline */
.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.tl-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.tl-title{font-size:12px;font-weight:700;color:var(--t2);}
.tl-search{padding:5px 10px;border:1px solid var(--border-s);border-radius:var(--rs);font-size:12px;font-family:inherit;outline:none;width:160px;color:var(--text);background:var(--surface2);}
.tl-search:focus{border-color:var(--accent);}

.tl-item{display:flex;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
.tl-item:last-child{border-bottom:none;}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--border-s);margin-top:3px;}
.tl-dot.issue{background:var(--red);}
.tl-dot.fb{background:var(--purple);}
.tl-type{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.tl-type.보고{background:var(--accent-l);color:var(--accent);}
.tl-type.피드백{background:var(--purple-l);color:var(--purple);}
.tl-date{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;min-width:68px;padding-top:2px;}
.tl-body{flex:1;}
.tl-text{font-size:13px;color:var(--text);line-height:1.5;}
.tl-text mark{background:var(--yellow-l);color:var(--yellow);font-weight:700;border-radius:2px;padding:0 2px;}
.tl-issue-tag{display:inline-block;font-size:10px;color:var(--red);font-weight:700;background:var(--red-l);padding:1px 7px;border-radius:20px;margin-top:3px;}
.tl-reporter{font-size:10px;color:var(--t3);margin-top:2px;}
.tl-del{background:none;border:1px solid var(--border);color:var(--t3);cursor:pointer;font-size:11px;padding:3px 8px;border-radius:4px;transition:all .12s;flex-shrink:0;}
.tl-del:hover{background:var(--red-l);color:var(--red);border-color:var(--red-l);}
.tl-empty{padding:28px;text-align:center;color:var(--t3);font-size:12px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .12s;letter-spacing:-.1px;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-2);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border-s);}
.btn-secondary:hover{background:var(--bg);}
.btn-ghost{background:none;color:var(--t2);border:1px dashed var(--border-s);}
.btn-ghost:hover{background:var(--surface2);border-style:solid;}
.btn-danger{background:var(--red-l);color:var(--red);}
.btn-danger:hover{background:#f8d0cc;}
.btn-mtg{background:#12122a;color:#9dd4ff;}
.btn-mtg:hover{background:#1e1e3a;}
.btn-mtg.on{background:var(--red);color:#fff;}
.btn-gist{background:#24292e;color:#fff;}
.btn-gist:hover{background:#1a1f24;}
.btn-sm{padding:5px 10px;font-size:11px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:14px;padding:26px;width:100%;max-width:500px;box-shadow:var(--sh3);transform:translateY(10px);transition:transform .2s;max-height:90vh;overflow-y:auto;}
.overlay.show .modal{transform:translateY(0);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;letter-spacing:-.4px;}
.modal-sub{font-size:11px;color:var(--t3);font-weight:400;margin-top:2px;}
.fg{margin-bottom:12px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
.fl .opt{font-weight:400;color:var(--t3);text-transform:none;letter-spacing:0;}
.fi,.fs,.ft{width:100%;padding:8px 11px;border:1px solid var(--border-s);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--accent);}
.ft{resize:vertical;min-height:72px;line-height:1.5;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.na-section{background:var(--accent-l);border:1px solid #c3d8f0;border-radius:var(--rs);padding:12px;margin-bottom:12px;}
.na-section .fg{margin-bottom:10px;}
.na-section .fg:last-child{margin-bottom:0;}
.fcheck{display:flex;align-items:center;gap:8px;cursor:pointer;}
.fcheck input{width:14px;height:14px;accent-color:var(--red);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* gist panel */
.gist-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 18px 16px;display:none;max-width:1060px;margin-left:auto;margin-right:auto;}
.gist-panel.show{display:block;}
.gist-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.gist-st{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.gist-st.ok{background:var(--green-l);color:var(--green);}
.gist-st.err{background:var(--red-l);color:var(--red);}
.gist-st.warn{background:var(--yellow-l);color:var(--yellow);}

/* settings */
.set-sect{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.set-title{font-size:13px;font-weight:700;margin-bottom:14px;}
.settings-view{max-width:600px;margin:0 auto;padding:20px 18px;}

/* conflict modal */
.conf-modal .modal{border-top:3px solid var(--red);max-width:400px;}

/* meeting mode sections */
.mtg-sect{margin-bottom:22px;}
.mtg-sect-title{font-size:12px;font-weight:700;padding:8px 12px;border-radius:var(--rs);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ms-r{background:var(--red-l);color:var(--red);}
.ms-y{background:var(--yellow-l);color:var(--yellow);}
.ms-g{background:var(--gray-l);color:var(--gray);}

/* ── MILESTONE / PHASE ── */
.ms-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.ms-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ms-header-title{font-size:12px;font-weight:700;color:var(--t2);}
.ms-overall{font-size:11px;color:var(--t3);}

.phase-block{border-bottom:1px solid var(--border);}
.phase-block:last-child{border-bottom:none;}
.phase-row{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface2);cursor:pointer;user-select:none;}
.phase-row:hover{background:#f0efe8;}
.phase-toggle{font-size:10px;color:var(--t3);width:14px;}
.phase-name{font-size:13px;font-weight:700;flex:1;}
.phase-period{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;}
.phase-prog{display:flex;align-items:center;gap:6px;}
.phase-prog-bar{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.phase-prog-fill{height:100%;border-radius:2px;background:var(--accent);}
.phase-prog-fill.done-col{background:var(--green);}
.phase-pct{font-size:10px;font-weight:700;color:var(--t3);font-family:'JetBrains Mono',monospace;min-width:28px;}
.phase-edit-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:3px;}
.phase-edit-btn:hover{background:var(--gray-l);}

.ms-list{padding:0;}
.ms-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px 9px 32px;border-top:1px solid var(--border);}

</style>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let S = {
  teamName:'교육연구부',
  members:['팀원 1','팀원 2','팀원 3','팀원 4'],
  projects:[],
  order:[],          // project id 순서
  lastSaved:null
};

let view = 'home';           // 'home' | 'project' | 'settings'
let selectedProjId = null;
let meetingMode = false;
let showDone = false;
let memberFilter = null;     // null = 전체, 0~3 = 팀원 인덱스
let statFilter = null;       // null | 'ongoing' | 'done' | 'issue' | 'overdue'
let tlFilter = '';           // 보고 타임라인 내 검색어
let sortMode = 'dday';       // 'dday' | 'silent' | 'manual'
let editingId = null;
let repProjId = null;
let loadedAt = null;
let pendingSave = null;
let searchOpen = false;

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => !s ? '' : s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function dday(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date().setHours(0,0,0,0)) / 86400000);
}
function ddLabel(d) {
  if (d === null) return null;
  if (d < 0) return `D+${Math.abs(d)}`;
  if (d === 0) return 'D-DAY';
  return `D-${d}`;
}
function ddClass(d) {
  if (d === null) return '';
  if (d < 0) return 'dday-over';
  if (d <= 3) return 'dday-d';
  if (d <= 7) return 'dday-w';
  return 'dday-ok';
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
}
function lastRep(p) {
  if (!p.reports.length) return null;
  return p.reports.reduce((a,b) => a.date > b.date ? a : b).date;
}
function hasIssue(p) { return p.reports.some(r => r.hasIssue); }
function isOverdue(p) { const d = dday(p.targetDate); return d !== null && d < 0 && p.status !== '완료'; }
function isSilent(p) { const d = daysSince(lastRep(p)); return d === null || d >= 14; }
function progClass(n) { return n >= 70 ? 'high' : n >= 40 ? 'mid' : 'low'; }

function orderedProjects() {
  const ids = S.order.filter(id => S.projects.find(p => p.id === id));
  const rest = S.projects.filter(p => !ids.includes(p.id)).map(p => p.id);
  return [...ids, ...rest].map(id => S.projects.find(p => p.id === id)).filter(Boolean);
}

function moveProject(id, dir) {
  if (!S.order.length) S.order = S.projects.map(p => p.id);
  const ids = S.order.filter(x => S.projects.find(p => p.id === x));
  const rest = S.projects.filter(p => !ids.includes(p.id)).map(p => p.id);
  const full = [...ids, ...rest];
  const i = full.indexOf(id);
  if (i === -1) return;
  const ni = i + dir;
  if (ni < 0 || ni >= full.length) return;
  [full[i], full[ni]] = [full[ni], full[i]];
  S.order = full;
  autoSave(); renderApp();
}

function highlight(text, kw) {
  if (!kw) return esc(text);
  const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return esc(text).replace(re, m => `<mark>${m}</mark>`);
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
function goHome() { view='home'; selectedProjId=null; tlFilter=''; renderApp(); window.scrollTo({top:0,behavior:'smooth'}); }
function goProject(id) { view='project'; selectedProjId=id; tlFilter=''; renderApp(); window.scrollTo({top:0,behavior:'smooth'}); }
function goSettings() { view='settings'; renderApp(); window.scrollTo({top:0,behavior:'smooth'}); }

// ═══════════════════════════════════════
//  RENDER DISPATCHER
// ═══════════════════════════════════════
function renderApp() {
  document.getElementById('hdTitle').textContent = S.teamName;
  const app = document.getElementById('app');
  if (view === 'home') app.innerHTML = renderHome();
  else if (view === 'project') app.innerHTML = renderDetail();
  else app.innerHTML = renderSettings();
}

function sortProjects(list) {
  if (sortMode === 'manual') return list;
  return [...list].sort((a, b) => {
    // 완료는 항상 뒤
    if (a.status === '완료' && b.status !== '완료') return 1;
    if (b.status === '완료' && a.status !== '완료') return -1;

    if (sortMode === 'dday') {
      // 1순위: 이슈/지연
      const aUrgent = (hasIssue(a) || isOverdue(a)) ? 0 : 1;
      const bUrgent = (hasIssue(b) || isOverdue(b)) ? 0 : 1;
      if (aUrgent !== bUrgent) return aUrgent - bUrgent;
      // 2순위: D-day 임박
      const add = dday(a.targetDate) ?? 999;
      const bdd = dday(b.targetDate) ?? 999;
      return add - bdd;
    }
    if (sortMode === 'silent') {
      // 업데이트 오래된 순
      const as = daysSince(lastRep(a)) ?? 9999;
      const bs = daysSince(lastRep(b)) ?? 9999;
      return bs - as;
    }
    return 0;
  });
}

function setSort(mode) { sortMode = mode; renderApp(); }

// ═══════════════════════════════════════
//  HOME
// ═══════════════════════════════════════
function renderHome() {
  const allProj = orderedProjects();
  const active = allProj.filter(p => p.status !== '완료');
  const done = allProj.filter(p => p.status === '완료');

  const total = allProj.length;
  const ongoing = allProj.filter(p => p.status === '진행중').length;
  const doneN = done.length;
  const issueN = allProj.filter(hasIssue).length;
  const overdueN = allProj.filter(isOverdue).length;

  // 담당자 필터 바 + 정렬 버튼
  const memberBtns = S.members.map((m,i) => {
    const cnt = allProj.filter(p => p.memberId === i).length;
    return `<button class="member-filter-btn ${memberFilter===i?'active':''}" onclick="setMemberFilter(${i})">${m}<span style="font-size:10px;opacity:.7;margin-left:4px;">${cnt}</span></button>`;
  }).join('');

  let filterBar = `
    <div class="home-bar">
      <span class="home-bar-label">담당자</span>
      <button class="member-filter-btn ${memberFilter===null?'active':''}" onclick="setMemberFilter(null)">전체</button>
      ${memberBtns}
      <span class="bar-sep"></span>
      <span class="home-bar-label">정렬</span>
      <button class="member-filter-btn ${sortMode==='dday'?'active':''}" onclick="setSort('dday')">⏰ D-day순</button>
      <button class="member-filter-btn ${sortMode==='silent'?'active':''}" onclick="setSort('silent')">💤 미보고순</button>
      <button class="member-filter-btn ${sortMode==='manual'?'active':''}" onclick="setSort('manual')">✋ 수동</button>
    </div>`;

  let statsHtml = `
    <div class="stats-row">
      <div class="stat-pill ${statFilter===null?'active':''}" onclick="setStatFilter(null)"><div class="sp-val">${total}</div><div class="sp-label">전체</div></div>
      <div class="stat-pill ${statFilter==='ongoing'?'active':''}" onclick="setStatFilter('ongoing')"><div class="sp-val ac">${ongoing}</div><div class="sp-label">진행중</div></div>
      <div class="stat-pill ${statFilter==='done'?'active':''}" onclick="setStatFilter('done')"><div class="sp-val gr">${doneN}</div><div class="sp-label">완료</div></div>
      <div class="stat-pill ${statFilter==='issue'?'active':''}" onclick="setStatFilter('issue')"><div class="sp-val ${issueN>0?'rd':''}">${issueN}</div><div class="sp-label">이슈</div></div>
      <div class="stat-pill ${statFilter==='overdue'?'active':''}" onclick="setStatFilter('overdue')"><div class="sp-val ${overdueN>0?'rd':''}">${overdueN}</div><div class="sp-label">지연</div></div>
    </div>`;

  let display = meetingMode
    ? active.filter(p => hasIssue(p) || isOverdue(p) || isSilent(p))
    : applyHomeFilters(allProj);

  // 정렬 적용
  display = sortProjects(display);

  let cardsHtml = '';
  if (meetingMode) {
    const urgent = sortProjects(active.filter(p => hasIssue(p) || isOverdue(p)));
    const deadline = sortProjects(active.filter(p => !hasIssue(p) && !isOverdue(p) && dday(p.targetDate) !== null && dday(p.targetDate) <= 7));
    const silent = active.filter(p => !hasIssue(p) && !isOverdue(p) && isSilent(p));
    const mtgSection = (title, cls, list) => {
      if (!list.length) return '';
      return `<div class="mtg-sect" style="padding:0 18px;max-width:1060px;margin:0 auto;">
        <div class="mtg-sect-title ${cls}">${title} (${list.length})</div>
        <div class="card-grid" style="padding:0;">${list.map(p => cardHtml(p)).join('')}</div>
      </div>`;
    };
    cardsHtml = `<div style="padding-top:14px;">
      ${mtgSection('🚨 이슈 / 지연', 'ms-r', urgent)}
      ${mtgSection('⏰ 마감 임박 7일', 'ms-y', deadline)}
      ${mtgSection('💤 미보고 14일+', 'ms-g', silent)}
      ${!urgent.length && !deadline.length && !silent.length ? '<div style="text-align:center;padding:40px;color:var(--t3);font-size:13px;">✅ 이슈/지연/미보고 사업 없음</div>' : ''}
    </div>`;
  } else {
    const activeDisplay = display.filter(p => p.status !== '완료');
    const doneDisplay = display.filter(p => p.status === '완료');
    cardsHtml = `<div class="card-grid">${activeDisplay.length ? activeDisplay.map(p => cardHtml(p)).join('') : '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--t3);font-size:13px;">표시할 사업이 없습니다</div>'}</div>`;
    if (doneDisplay.length > 0) {
      cardsHtml += `<button class="done-toggle" onclick="toggleDone()">
        ${showDone ? '▲ 완료 사업 접기' : `▼ 완료 사업 ${doneDisplay.length}개 보기`}
      </button>`;
      if (showDone) {
        cardsHtml += `<div class="card-grid" style="opacity:.7;">${doneDisplay.map(p => cardHtml(p)).join('')}</div>`;
      }
    }
  }

  return filterBar + statsHtml + cardsHtml;
}

function applyHomeFilters(list) {
  return list.filter(p => {
    if (memberFilter !== null && p.memberId !== memberFilter) return false;
    if (statFilter === 'ongoing' && p.status !== '진행중') return false;
    if (statFilter === 'done' && p.status !== '완료') return false;
    if (statFilter === 'issue' && !hasIssue(p)) return false;
    if (statFilter === 'overdue' && !isOverdue(p)) return false;
    return true;
  });
}

function setMemberFilter(v) { memberFilter = v; renderApp(); }
function setStatFilter(v) { statFilter = v === statFilter ? null : v; renderApp(); }
function toggleDone() { showDone = !showDone; renderApp(); }

const CARD_ICONS = ['📋','🎬','📚','🛡️','🎯','📊','🔍','🗂️','💡','🏗️'];
const CARD_GRADIENTS = [
  'linear-gradient(160deg,#1e4976,#2d6fa8)',
  'linear-gradient(160deg,#1a6b4a,#27a06e)',
  'linear-gradient(160deg,#6b3a9e,#9b5fd1)',
  'linear-gradient(160deg,#8a4a00,#c97a1a)',

function cardHtml(p) {
  const dd = dday(p.targetDate);
  const ddL = dd !== null ? ddLabel(dd) : null;
  const memberName = S.members[p.memberId] || '';
  const pHasIssue = hasIssue(p);
  const lrd = lastRep(p);
  const since = daysSince(lrd);

  let ddBadge = '';
  if (ddL) {
    const cls = dd < 0 ? 'over' : dd <= 3 ? 'soon' : 'ok';
    ddBadge = `<span class="dday-inline ${cls}">${ddL}</span>`;
  }

  let updCls='ok', updText='';
  if (since===null)   {updCls='danger';updText='미보고';}
  else if (since>=14) {updCls='danger';updText=`${since}일 전`;}
  else if (since>=7)  {updCls='warn';  updText=`${since}일 전`;}
  else if (since===0) {updCls='ok';    updText='오늘';}
  else                {updCls='ok';    updText=`${since}일 전`;}

  const progCls = p.progress>=70?'high':p.progress>=40?'mid':'low';

  const allProj = orderedProjects();
  const idx = allProj.findIndex(x => x.id === p.id);
  const orderBtns = sortMode==='manual' ? `
    <span onclick="event.stopPropagation()">
      ${idx>0?`<button style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;padding:1px 3px;" onclick="moveProject('${p.id}',-1)">▲</button>`:''}
      ${idx<allProj.length-1?`<button style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;padding:1px 3px;" onclick="moveProject('${p.id}',1)">▼</button>`:''}
    </span>` : '';

  return `
  <div class="pc" onclick="goProject('${p.id}')">
    <div class="pc-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          <span class="st-dot ${p.status}"></span>
          <span style="font-size:11px;color:var(--t2);font-weight:600;">${p.status}</span>
          ${ddBadge}
          ${pHasIssue?'<span class="issue-glow"></span>':''}
        </div>
        <div style="display:flex;align-items:center;gap:4px;">
          <span class="pc-pct">${p.progress}%</span>
          ${orderBtns}
        </div>
      </div>
      <div class="pc-name">${esc(p.name)}</div>
      <div class="pc-prog-inline" style="margin:6px 0 5px;">
        <div class="pc-prog-inline-fill ${progCls}" style="width:${p.progress}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="mem-tag-sm">${esc(memberName)}</span>
        <span class="pc-update ${updCls}">🕐 ${updText}</span>
      </div>
    </div>
  </div>`;
}

function renderDetail() {
  const p = S.projects.find(x => x.id === selectedProjId);
  if (!p) return `<div style="padding:40px;text-align:center;color:var(--t3);">사업을 찾을 수 없습니다.</div>`;

  const dd = dday(p.targetDate);
  const ddL = dd !== null ? ddLabel(dd) : null;
  const ddC = dd !== null ? ddClass(dd) : '';
  const memberName = S.members[p.memberId] || '';
  const lrd = lastRep(p);
  const since = daysSince(lrd);
  const pHasIssue = hasIssue(p);

  let repMetaHtml = '';
  if (since === null || since >= 14) repMetaHtml = `<span style="color:var(--red);font-weight:600;">📅 ${since === null ? '보고 없음' : since + '일 전 보고'}</span>`;
  else if (since >= 7) repMetaHtml = `<span style="color:var(--yellow);font-weight:600;">📅 ${since}일 전 보고</span>`;
  else repMetaHtml = `<span style="color:var(--t3);">📅 ${since}일 전 보고</span>`;

  // next action
  let naHtml = '';
  if (p.nextAction) {
    const nadd = dday(p.nextActionDue);
    const naDueCls = nadd !== null && nadd <= 3 ? 'warn' : '';
    const naDueLabel = p.nextActionDue ? `기한: ${p.nextActionDue}${nadd !== null ? ' (' + ddLabel(nadd) + ')' : ''}` : '';
    naHtml = `<div class="det-na"><div class="na-label">▶ 다음 액션</div><div class="na-text" style="font-size:14px;">${esc(p.nextAction)}</div>${naDueLabel ? `<div class="na-due ${naDueCls}" style="font-size:11px;">${naDueLabel}</div>` : ''}</div>`;
  } else if (p.status !== '완료') {
    naHtml = `<div class="na-empty" style="margin-bottom:14px;">⚠ 다음 액션 미입력</div>`;
  }

  // timeline with filter
  const sorted = [...p.reports].sort((a,b) => b.date.localeCompare(a.date));
  const filtered = tlFilter ? sorted.filter(r => r.content.toLowerCase().includes(tlFilter.toLowerCase()) || (r.reporter||'').toLowerCase().includes(tlFilter.toLowerCase())) : sorted;

  let tlHtml = '';
  if (filtered.length === 0) {
    tlHtml = `<div class="tl-empty">${tlFilter ? '검색 결과 없음' : '보고 기록이 없습니다.'}</div>`;
  } else {
    filtered.forEach(r => {
      const isFb = r.type === '피드백';
      tlHtml += `
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-dot ${r.hasIssue?'issue':isFb?'fb':''}"></div>
            <span class="tl-type ${r.type||'보고'}">${r.type||'보고'}</span>
          </div>
          <div class="tl-date">${r.date}</div>
          <div class="tl-body">
            <div class="tl-text">${highlight(r.content, tlFilter)}</div>
            ${r.hasIssue ? '<span class="tl-issue-tag">🚨 이슈</span>' : ''}
            <div class="tl-reporter">${esc(r.reporter||'')}</div>
          </div>
          <button class="tl-del" onclick="event.stopPropagation();confirmDel(this,'${p.id}','${r.id}')">삭제</button>
        </div>`;
    });
  }

  return `
  <div class="detail-view">
    <button class="back-btn" onclick="goHome()">← 목록으로</button>

    <div class="det-card">
      <div class="det-top">
        <div class="det-badges">
          <span class="pri-b ${p.priority}">${p.priority}</span>
          ${ddL ? `<span class="dday ${ddC}">${ddL}</span>` : ''}
          <span class="mem-tag">${esc(memberName)}</span>
          <span class="st-badge st-${p.status}">${p.status}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" onclick="openAddRep('${p.id}')">+ 보고 추가</button>
          <button class="btn btn-secondary btn-sm" onclick="openEditProj('${p.id}')">✏ 수정</button>
          ${p.link ? `<a href="${esc(p.link)}" target="_blank" class="btn btn-ghost btn-sm">🔗 링크</a>` : ''}
        </div>
      </div>
      <h2 class="det-name">${esc(p.name)}</h2>
      ${p.summary ? `<p class="det-summary">${esc(p.summary)}</p>` : ''}
      <div class="prog-row" style="margin-bottom:12px;">
        <div class="prog-bar" style="height:6px;"><div class="prog-fill ${progClass(p.progress)}" style="width:${p.progress}%"></div></div>
        <span class="prog-pct">${p.progress}%</span>
      </div>
      <div class="det-meta">
        ${p.startDate ? `<span>📅 시작: ${p.startDate}</span>` : ''}
        ${p.targetDate ? `<span>🎯 목표: ${p.targetDate}</span>` : ''}
        <span>📝 보고 ${p.reports.length}건</span>
        ${repMetaHtml}
      </div>
      ${pHasIssue ? `<div class="issue-strip" style="margin:14px -20px -20px;border-radius:0 0 var(--r) var(--r);padding:6px 20px;">🚨 이슈 있음</div>` : ''}
    </div>

    ${naHtml}

    ${renderMilestones(p)}

    <div class="tl-card">
      <div class="tl-header">
        <span class="tl-title">📋 보고 타임라인 (${p.reports.length}건)</span>

      </div>
      ${tlHtml}
    </div>
  </div>`;
}

function toggleSearch() {
  searchOpen = !searchOpen;
  const inp = document.getElementById('searchInput');
  inp.classList.toggle('open', searchOpen);
  if (searchOpen) { inp.focus(); }
  else { inp.value=''; document.getElementById('searchResults').classList.remove('show'); }
}

function doSearch(kw) {
  const res = document.getElementById('searchResults');
  if (!kw.trim()) { res.classList.remove('show'); return; }
  const q = kw.toLowerCase();
  let hits = [];

  S.projects.forEach(p => {
    // 사업명 매치
    if (p.name.toLowerCase().includes(q)) {
      hits.push({ projId: p.id, projName: p.name, text: p.name, date: '', reporter: '', isMeta: true });
    }
    // 보고 매치
    p.reports.forEach(r => {
      if (r.content.toLowerCase().includes(q) || (r.reporter||'').toLowerCase().includes(q)) {
        hits.push({ projId: p.id, projName: p.name, text: r.content, date: r.date, reporter: r.reporter||'' });
      }
    });
  });

  if (!hits.length) {
    res.innerHTML = '<div class="sr-empty">검색 결과 없음</div>';
  } else {
    res.innerHTML = hits.slice(0,20).map(h => `
      <div class="sr-item" onclick="goProject('${h.projId}');toggleSearch();">
        <div class="sr-proj">${esc(h.projName)}</div>
        <div class="sr-text">${highlight(h.text.slice(0,80), kw)}</div>
        ${h.date ? `<div class="sr-meta">${h.date} · ${esc(h.reporter)}</div>` : ''}
      </div>`).join('');
  }
  res.classList.add('show');
}

// close search on outside click

  if (!e.target.closest('#searchWrap')) {
    document.getElementById('searchResults').classList.remove('show');
  }
});

function openEditProj(id) {
  editingId = id;
  const p = S.projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('projModalTitle').textContent = '사업 수정';
  document.getElementById('projModalActions').innerHTML = `
    <button class="btn btn-danger btn-sm" onclick="deleteProj()">삭제</button>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="closeModal('projModal')">취소</button>

    </div>`;
  const sel = document.getElementById('pMember');
  sel.innerHTML = S.members.map((m,i) => `<option value="${i}" ${i===p.memberId?'selected':''}>${m}</option>`).join('');
  document.getElementById('pName').value = p.name;
  document.getElementById('pPri').value = p.priority || '중';
  document.getElementById('pStatus').value = p.status;
  document.getElementById('pSummary').value = p.summary || '';
  document.getElementById('pNA').value = p.nextAction || '';
  document.getElementById('pNADue').value = p.nextActionDue || '';
  document.getElementById('pProg').value = p.progress;
  document.getElementById('pStart').value = p.startDate || '';
  document.getElementById('pTarget').value = p.targetDate || '';
  document.getElementById('pLink').value = p.link || '';
  openModal('projModal');
}

function saveProj() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { alert('사업명을 입력해주세요.'); return; }
  if (editingId) {
    const p = S.projects.find(x => x.id === editingId);
    Object.assign(p, {
      memberId: parseInt(document.getElementById('pMember').value),
      name, priority: document.getElementById('pPri').value,
      status: document.getElementById('pStatus').value,
      summary: document.getElementById('pSummary').value.trim(),
      nextAction: document.getElementById('pNA').value.trim(),
      nextActionDue: document.getElementById('pNADue').value,
      progress: parseInt(document.getElementById('pProg').value)||0,
      startDate: document.getElementById('pStart').value,
      targetDate: document.getElementById('pTarget').value,
      link: document.getElementById('pLink').value.trim()
    });
    closeModal('projModal'); autoSave();
    if (view === 'project') renderApp(); else renderApp();
  } else {
    const newP = {
      id: uid(),
      memberId: parseInt(document.getElementById('pMember').value),
      name, priority: document.getElementById('pPri').value,
      status: document.getElementById('pStatus').value,
      summary: document.getElementById('pSummary').value.trim(),
      nextAction: document.getElementById('pNA').value.trim(),
      nextActionDue: document.getElementById('pNADue').value,
      progress: parseInt(document.getElementById('pProg').value)||0,
      startDate: document.getElementById('pStart').value,
      targetDate: document.getElementById('pTarget').value,
      link: document.getElementById('pLink').value.trim(),
      reports: [], createdAt: today()
    };
    S.projects.push(newP);
    S.order.push(newP.id);
    closeModal('projModal'); autoSave();
    goProject(newP.id);
  }
}

function deleteProj() {
  S.projects = S.projects.filter(p => p.id !== editingId);
  S.order = S.order.filter(id => id !== editingId);
  closeModal('projModal'); autoSave(); goHome();
}

function openAddRep(projId) {
  repProjId = projId;
  const p = S.projects.find(x => x.id === projId);
  document.getElementById('repModalSub').textContent = p ? p.name : '';
  const sel = document.getElementById('rReporter');
  sel.innerHTML = S.members.map(m => `<option>${m}</option>`).join('') + '<option value="관리자">관리자</option>';
  if (p) sel.value = S.members[p.memberId] || S.members[0];
  document.getElementById('rType').value = '보고';
  document.getElementById('rDate').value = today();
  document.getElementById('rContent').value = '';
  document.getElementById('rNA').value = '';
  document.getElementById('rNADue').value = '';
  document.getElementById('rProg').value = '';
  document.getElementById('rStatus').value = '';
  document.getElementById('rIssue').checked = false;
  openModal('repModal');
}

function saveRep() {
  const content = document.getElementById('rContent').value.trim();
  if (!content) { alert('내용을 입력해주세요.'); return; }
  const p = S.projects.find(x => x.id === repProjId);
  if (!p) return;
  p.reports.push({
    id: uid(),
    date: document.getElementById('rDate').value || today(),
    type: document.getElementById('rType').value,
    content, reporter: document.getElementById('rReporter').value,
    hasIssue: document.getElementById('rIssue').checked
  });
  const na = document.getElementById('rNA').value.trim();
  if (na) { p.nextAction = na; p.nextActionDue = document.getElementById('rNADue').value; }
  const prog = document.getElementById('rProg').value;
  if (prog !== '') p.progress = parseInt(prog);
  const st = document.getElementById('rStatus').value;
  if (st) p.status = st;
  closeModal('repModal'); autoSave(); renderApp();
}

function confirmDel(btn, projId, repId) {
  if (btn.dataset.pending === '1') {
    deleteRep(projId, repId);
  } else {
    btn.dataset.pending = '1';
    btn.textContent = '확인';
    btn.style.background = 'var(--red-l)';
    btn.style.color = 'var(--red)';
    btn.style.borderColor = 'var(--red)';
    setTimeout(() => {
      if (btn.isConnected) {
        btn.dataset.pending = '';
        btn.textContent = '삭제';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }
    }, 2500);
  }
}

function deleteRep(projId, repId) {
  const p = S.projects.find(x => x.id === projId);
  if (!p) return;
  p.reports = p.reports.filter(r => r.id !== repId);
  autoSave(); renderApp();
}

async function saveGist() {
  const token = document.getElementById('gistToken').value.trim();
  const gistId = document.getElementById('gistId').value.trim();
  if (!token) { showGistSt('토큰을 입력해주세요','err'); return; }
  if (gistId && loadedAt) {
    try {
      const check = await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`}});
      const meta = await check.json();
      const gistUpd = new Date(meta.updated_at).getTime();
      if (gistUpd > loadedAt) {
        document.getElementById('confGistT').textContent = new Date(meta.updated_at).toLocaleString('ko-KR');
        document.getElementById('confLoadT').textContent = new Date(loadedAt).toLocaleString('ko-KR');
        pendingSave = {token, gistId};
        openModal('confModal'); return;
      }
    } catch(e) {}
  }
  await doSave(token, gistId);
}
async function forceSave() { closeModal('confModal'); if(pendingSave) await doSave(pendingSave.token, pendingSave.gistId); }
async function doSave(token, gistId) {
  S.lastSaved = new Date().toISOString();
  showGistSt('저장 중...','');
  try {
    const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
    const res = await fetch(url,{method:gistId?'PATCH':'POST',headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({description:S.teamName,public:false,files:{'team_tracker.json':{content:JSON.stringify(S,null,2)}}})});
    const j = await res.json();
    if (j.id) {
      document.getElementById('gistId').value = j.id;
      localStorage.setItem('tt_gistId', j.id);
      localStorage.setItem('tt_token', token);
      loadedAt = Date.now();
      const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('savedT').textContent = `저장 ${t}`;
      showGistSt('저장 완료','ok'); autoSave();
    } else showGistSt('실패: '+(j.message||''),'err');
  } catch(e) { showGistSt('오류: '+e.message,'err'); }
}
async function loadGist() {
  const token = document.getElementById('gistToken').value.trim();
  const gistId = document.getElementById('gistId').value.trim();
  if (!gistId) { showGistSt('Gist ID를 입력해주세요','err'); return; }
  showGistSt('불러오는 중...','');
  try {
    const headers = token ? {Authorization:`token ${token}`} : {};
    const res = await fetch(`https://api.github.com/gists/${gistId}`,{headers});
    const j = await res.json();
    const file = j.files['team_tracker.json'];
    if (!file) { showGistSt('파일 없음','err'); return; }
    const content = file.truncated ? await (await fetch(file.raw_url)).text() : file.content;
    S = JSON.parse(content);
    loadedAt = Date.now();
    localStorage.setItem('tt_gistId', gistId);
    if (token) localStorage.setItem('tt_token', token);
    const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('savedT').textContent = `로드 ${t}`;
    showGistSt('불러오기 완료','ok'); autoSave(); goHome();
  } catch(e) { showGistSt('오류: '+e.message,'err'); }
}
function showGistSt(msg, cls) {
  const el = document.getElementById('gistSt'); el.style.display=''; el.textContent=msg; el.className='gist-st '+cls;
}

//  MILESTONE / PHASE FUNCTIONS
// ═══════════════════════════════════════
let editingPhaseId = null;
let editingMsId = null;
let editingMsProjId = null;
let editingMsPhaseId = null;
let collapsedPhases = new Set();

function togglePhase(projId, phaseId) {
  const key = projId + '_' + phaseId;
  if (collapsedPhases.has(key)) collapsedPhases.delete(key);
  else collapsedPhases.add(key);
  renderApp();
}

function phaseProgress(phase) {
  if (!phase.milestones || !phase.milestones.length) return 0;
  const done = phase.milestones.filter(m => m.status === 'done').length;
  return Math.round((done / phase.milestones.length) * 100);
}

function overallProgress(phases) {
  if (!phases || !phases.length) return {done:0, total:0};
  const all = phases.flatMap(ph => ph.milestones || []);
  return {done: all.filter(m => m.status === 'done').length, total: all.length};
}

// 보고 내용 기반 자동 감지
function autoDetect(p) {
  if (!p.phases) return;
  const allContent = p.reports.map(r => r.content.toLowerCase()).join(' ');
  let changed = false;
  p.phases.forEach(ph => {
    (ph.milestones || []).forEach(m => {
      if (m.status === 'done') return; // 이미 달성이면 건드리지 않음
      if (!m.keywords || !m.keywords.length) return;
      const hit = m.keywords.some(kw => allContent.includes(kw.toLowerCase().trim()));
      if (hit && m.status !== 'done') {
        m.status = 'done';
        m.autoDetected = true;
        changed = true;
      }
    });
  });
  if (changed) { autoSave(); }
}

function renderMilestones(p) {
  if (!p.phases || !p.phases.length) {
    return `
      <div class="ms-wrap">
        <div class="ms-header">
          <span class="ms-header-title">📍 마일스톤</span>
          <button class="btn btn-ghost btn-sm" onclick="openAddPhase('${p.id}')">+ 페이즈 추가</button>
        </div>
        <div style="padding:24px;text-align:center;color:var(--t3);font-size:12px;">
          마일스톤이 없습니다.<br>페이즈를 추가해 보세요.
        </div>
      </div>`;
  }

  autoDetect(p);
  const ov = overallProgress(p.phases);
  const ovPct = ov.total ? Math.round((ov.done / ov.total) * 100) : 0;

  let html = `
    <div class="ms-wrap">
      <div class="ms-header">
        <span class="ms-header-title">📍 마일스톤</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="ms-overall">${ov.done}/${ov.total} 달성 (${ovPct}%)</span>
          <button class="btn btn-ghost btn-sm" onclick="runAutoDetect('${p.id}')">🔍 자동 감지</button>
          <button class="btn btn-ghost btn-sm" onclick="openAddPhase('${p.id}')">+ 페이즈</button>
        </div>
      </div>`;

  p.phases.forEach(ph => {
    const pct = phaseProgress(ph);
    const collapsed = collapsedPhases.has(p.id + '_' + ph.id);
    const msCount = (ph.milestones || []).length;
    const doneCount = (ph.milestones || []).filter(m => m.status === 'done').length;

    html += `
      <div class="phase-block">
        <div class="phase-row" onclick="togglePhase('${p.id}','${ph.id}')">
          <span class="phase-toggle">${collapsed ? '▶' : '▼'}</span>
          <span class="phase-name">${esc(ph.name)}</span>
          <span class="phase-period">${esc(ph.period||'')}</span>
          <div class="phase-prog">
            <div class="phase-prog-bar"><div class="phase-prog-fill ${pct===100?'done-col':''}" style="width:${pct}%"></div></div>
            <span class="phase-pct">${doneCount}/${msCount}</span>
          </div>
          <button class="phase-edit-btn" onclick="event.stopPropagation();openEditPhase('${p.id}','${ph.id}')">✏</button>
        </div>`;

    if (!collapsed) {
      html += `<div class="ms-list">`;
      (ph.milestones || []).forEach(m => {
        const icon = m.status === 'done' ? '✅' : m.status === 'ing' ? '🔄' : '⬜';
        const dd = dday(m.due);
        const dueStr = m.due ? `${m.due}${dd !== null ? ' (' + ddLabel(dd) + ')' : ''}` : '';
        const dueCls = dd !== null && dd < 0 && m.status !== 'done' ? 'over' : '';
        html += `
          <div class="ms-item">
            <span class="ms-icon" onclick="cycleMsStatus('${p.id}','${ph.id}','${m.id}')">${icon}</span>
            <div class="ms-body">
              <span class="ms-name ${m.status==='done'?'done':''}">${esc(m.name)}${m.autoDetected?'<span class="ms-auto-tag">자동감지</span>':''}${m.assignee?`<span class="ms-assignee">${esc(m.assignee)}</span>`:''}</span>
              ${dueStr ? `<div class="ms-due ${dueCls}">${dueStr}</div>` : ''}
              ${m.note ? `<div class="ms-note">${esc(m.note)}</div>` : ''}
            </div>
            <div class="ms-actions">
              <button class="ms-btn" onclick="cycleMsStatus('${p.id}','${ph.id}','${m.id}')">${m.status==='done'?'달성됨':m.status==='ing'?'진행중':'미시작'}</button>
              <button class="ms-btn" onclick="openEditMs('${p.id}','${ph.id}','${m.id}')">✏</button>
              <button class="ms-btn" onclick="deleteMs('${p.id}','${ph.id}','${m.id}')">✕</button>
            </div>
          </div>`;
      });
      html += `
        <div class="ms-add-row">
          <button class="btn btn-ghost btn-sm" onclick="openAddMs('${p.id}','${ph.id}')">+ 마일스톤 추가</button>
        </div>
      </div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

function runAutoDetect(projId) {
  const p = S.projects.find(x => x.id === projId);
  if (!p) return;
  autoDetect(p);
  autoSave(); renderApp();
}

function cycleMsStatus(projId, phaseId, msId) {
  const p = S.projects.find(x => x.id === projId);
  const ph = (p.phases||[]).find(x => x.id === phaseId);
  const m = (ph.milestones||[]).find(x => x.id === msId);
  if (!m) return;
  const cycle = {todo:'ing', ing:'done', done:'todo'};
  m.status = cycle[m.status] || 'todo';
  m.autoDetected = false;
  autoSave(); renderApp();
}

function deleteMs(projId, phaseId, msId) {
  const p = S.projects.find(x => x.id === projId);
  const ph = (p.phases||[]).find(x => x.id === phaseId);
  if (!ph) return;
  ph.milestones = (ph.milestones||[]).filter(m => m.id !== msId);
  autoSave(); renderApp();
}

function openAddPhase(projId) {
  editingPhaseId = null;
  editingMsProjId = projId;
  document.getElementById('phaseModalTitle').textContent = '페이즈 추가';
  document.getElementById('phName').value = '';
  document.getElementById('phPeriod').value = '';
  document.getElementById('phaseModalActions').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal('phaseModal')">취소</button>
    <button class="btn btn-primary" onclick="savePhase()">저장</button>`;
  openModal('phaseModal');
}

function openEditPhase(projId, phaseId) {
  const p = S.projects.find(x => x.id === projId);
  const ph = (p.phases||[]).find(x => x.id === phaseId);
  if (!ph) return;
  editingPhaseId = phaseId;
  editingMsProjId = projId;
  document.getElementById('phaseModalTitle').textContent = '페이즈 수정';
  document.getElementById('phName').value = ph.name;
  document.getElementById('phPeriod').value = ph.period || '';
  document.getElementById('phaseModalActions').innerHTML = `
    <button class="btn btn-danger btn-sm" onclick="deletePhase()">삭제</button>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="closeModal('phaseModal')">취소</button>
      <button class="btn btn-primary" onclick="savePhase()">저장</button>
    </div>`;
  openModal('phaseModal');
}

function savePhase() {
  const name = document.getElementById('phName').value.trim();
  if (!name) { alert('페이즈 이름을 입력해주세요.'); return; }
  const p = S.projects.find(x => x.id === editingMsProjId);
  if (!p) return;
  if (!p.phases) p.phases = [];
  if (editingPhaseId) {
    const ph = p.phases.find(x => x.id === editingPhaseId);
    ph.name = name;
    ph.period = document.getElementById('phPeriod').value;
  } else {
    p.phases.push({ id: uid(), name, period: document.getElementById('phPeriod').value, milestones: [] });
  }
  closeModal('phaseModal'); autoSave(); renderApp();
}

function deletePhase() {
  const p = S.projects.find(x => x.id === editingMsProjId);
  if (!p) return;
  p.phases = (p.phases||[]).filter(ph => ph.id !== editingPhaseId);
  closeModal('phaseModal'); autoSave(); renderApp();
}

function openEditMs(projId, phaseId, msId) {
  const p = S.projects.find(x => x.id === projId);
  const ph = (p.phases||[]).find(x => x.id === phaseId);
  const m = (ph.milestones||[]).find(x => x.id === msId);
  if (!m) return;
  editingMsId = msId;
  editingMsProjId = projId;
  editingMsPhaseId = phaseId;
  document.getElementById('msModalTitle').textContent = '마일스톤 수정';
  document.getElementById('msName').value = m.name;
  document.getElementById('msDue').value = m.due || '';
  document.getElementById('msStatus').value = m.status || 'todo';
  document.getElementById('msNote').value = m.note || '';
  document.getElementById('msKeywords').value = (m.keywords||[]).join(', ');
  populateMsAssignee(m.assignee || '');
  document.getElementById('msModalActions').innerHTML = `
    <button class="btn btn-danger btn-sm" onclick="deleteMs('${projId}','${phaseId}','${msId}');closeModal('msModal')">삭제</button>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="closeModal('msModal')">취소</button>
      <button class="btn btn-primary" onclick="saveMilestone()">저장</button>
    </div>`;
  openModal('msModal');
}

function saveMilestone() {
  const name = document.getElementById('msName').value.trim();
  if (!name) { alert('마일스톤 이름을 입력해주세요.'); return; }
  const p = S.projects.find(x => x.id === editingMsProjId);
  const ph = (p.phases||[]).find(x => x.id === editingMsPhaseId);
  if (!ph) return;
  const kwRaw = document.getElementById('msKeywords').value;
  const keywords = kwRaw ? kwRaw.split(',').map(k => k.trim()).filter(Boolean) : [];
  const assignee = document.getElementById('msAssignee').value;
  if (editingMsId) {
    const m = (ph.milestones||[]).find(x => x.id === editingMsId);
    Object.assign(m, { name, due: document.getElementById('msDue').value, status: document.getElementById('msStatus').value, note: document.getElementById('msNote').value, keywords, assignee });
    m.autoDetected = false;
  } else {
    if (!ph.milestones) ph.milestones = [];
    ph.milestones.push({ id: uid(), name, due: document.getElementById('msDue').value, status: document.getElementById('msStatus').value, note: document.getElementById('msNote').value, keywords, assignee, autoDetected: false });
  }
  closeModal('msModal'); autoSave(); renderApp();
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('tt_data');
  if (saved) {
    try { S = JSON.parse(saved); if(!S.order) S.order=[]; } catch {}
  }
  // 구 팀명 강제 업데이트
  if (S.teamName === '팀 업무 트래커' || S.teamName === '어린이집안전공제회 콘텐츠팀') {
    S.teamName = '교육연구부';
  }
  // 프로젝트가 없으면 세 샘플 모두 추가
  if (!S.projects || S.projects.length === 0) {
    S.teamName = '교육연구부';
    S.members = ['서기원 대리', '황수연 주임', '이경희 주임', '팀원 4'];
    const p1 = makeSampleProject();
    const p2 = makeVideoProject();
    const p3 = makeEncyclopediaProject();
    S.projects.push(p1, p2, p3);
    S.order.push(p1.id, p2.id, p3.id);
    autoSave();
  // 프로젝트가 1개면 영상+백과 추가
  } else if (S.projects.length === 1) {
    S.members[1] = '황수연 주임';
    S.members[2] = '이경희 주임';
    const p2 = makeVideoProject();
    const p3 = makeEncyclopediaProject();
    S.projects.push(p2, p3);
    S.order.push(p2.id, p3.id);
    autoSave();
  // 프로젝트가 2개면 백과만 추가
  } else if (S.projects.length === 2 && !S.projects.find(p => p.name.includes('안전관리백과'))) {
    S.members[2] = '이경희 주임';
    const p3 = makeEncyclopediaProject();
    S.projects.push(p3);
    S.order.push(p3.id);
    autoSave();
  }
  const sid = localStorage.getItem('tt_gistId');
  if (sid) document.getElementById('gistId').value = sid;
  const stok = localStorage.getItem('tt_token');
  if (stok) document.getElementById('gistToken').value = stok;
  renderApp();
});
